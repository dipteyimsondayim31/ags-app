version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ags-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ags_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
