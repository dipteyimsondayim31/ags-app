version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ags-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ags_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ags_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ags-web
    restart: always
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ags_db?schema=public
      - NEXTAUTH_SECRET=e932b7d2db8905ab9e0a0a543fde4926615b138fe9b52a926177589f81cd421f
      - AUTH_SECRET=e932b7d2db8905ab9e0a0a543fde4926615b138fe9b52a926177589f81cd421f
      - NEXTAUTH_URL=http://localhost:3000
      - AUTH_TRUST_HOST=true
      - ADMIN_PASSWORD=admin_strong_password_here
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
